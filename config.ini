[Server]
host = 0.0.0.0
port = 5000
debug = True
environment = development
timezone = Asia/Kolkata

[POSTGRES]
host = localhost
port = 5432
database = bridge_db
username = postgres
password = secret

[SQLITE]
path = instance
database = bridge_app.db

[UI]
theme = glass
colormode = auto
date_format = DD/MM/YYYY HH:mm:ss

[Logging]
log_dir = logs
rotation = daily
backup_count = 30

[RetryQueue]
retention_minutes = 60

[Swagger]
refresh_interval = 1
refresh_unit = hours

