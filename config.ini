[Server]
# GraphQL IDE: GraphQL Playground (served automatically for all GraphQL pull templates)
# The IP address the server binds to (0.0.0.0 allows external access)
host = 0.0.0.0
# The port the application runs on
port = 5000
# Enable or disable Flask debug mode
debug = True
# The current execution environment (development or production)
environment = development
# The default timezone used for date/time formatting and logs
timezone = Asia/Kolkata
# Redis/Memurai connection URL for distributed background task scaling
redis_url = redis://localhost:6379/0

[POSTGRES] # For Postgres change environment to "production" and debug to "False"
# Database hostname or IP
host = localhost
# Database connection port
port = 5432
# Name of the database to connect to
database = bridge_db
# Authentication username
username = postgres
# Authentication password
password = secret

[SQLITE] # For SQLite change environment to "development" and debug to "True"
# Directory path where the SQLite file is stored
path = instance
# Name of the SQLite database file
database = bridge_app.db

[UI]
# Dashboard interface settings (theme and color mode are updated via the UI)
# UI theme name (e.g., glass, dark, light)
theme = clay
# UI color mode (auto, light, dark) determines automatic switching based on system preference
colormode = auto
# Date and time format used throughout the app (compatible with JavaScript date-fns or Moment.js patterns)
date_format = DD/MM/YYYY HH:mm:ss

[OPENTELEMETRY]
# Set enabled to true when your Zabbix or Jaeger server is running to avoid ConnectionRefused errors
enabled = false
otlp_endpoint = http://localhost:4318/v1/traces

[Logging]
# Application logging configuration
log_dir = logs
# How often to rotate the log files (e.g., daily, weekly)
rotation = daily
# Maximum number of old log files to retain
backup_count = 30

[RetryQueue]
# How long (in minutes) failed jobs should be retained in the queue before being purged
retention_minutes = 60

[Swagger]
# Background job interval for auto-refreshing remote Swagger JSON URLs
refresh_interval = 1
refresh_unit = hours
