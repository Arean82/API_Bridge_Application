<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal API Bridge</title>
    <!-- Tailwind CSS with Local Fallback -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>window.tailwind || document.write(`<script src="{{ url_for('static', filename='vendor/tailwindcss.js') }}"><\/script>`)</script>

    <!-- HTMX with Local Fallback -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>window.htmx || document.write(`<script src="{{ url_for('static', filename='vendor/htmx.min.js') }}"><\/script>`)</script>

    <!-- Highlight.js with Local Fallback -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/default.min.css" onerror="this.onerror=null; this.href=`{{ url_for('static', filename='vendor/highlight-default.min.css') }}`;">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script>window.hljs || document.write(`<script src="{{ url_for('static', filename='vendor/highlight.min.js') }}"><\/script>`)</script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body data-initial-theme="{{ current_theme }}" data-theme="{{ current_theme }}" class="font-sans antialiased">
    
    <nav class="theme-nav p-4 flex justify-between items-center">
        <div class="flex items-center space-x-6">
            <h1 class="text-2xl font-bold tracking-wide">Universal API Bridge</h1>
            <nav class="flex gap-4">
                <a href="/" class="hover:opacity-75 transition">Schedule Config</a>
                <a href="/templates" class="hover:opacity-75 transition">Templates</a>
                <a href="/templates/create" class="hover:opacity-75 transition">Create Template</a>
                <a href="/connections" class="hover:opacity-75 transition text-blue-400 font-bold">Connections</a>
            </nav>
        </div>
        <div class="flex items-center space-x-4">
            <!-- Theme Color Selector (Original) -->
            <select id="themeSelector" class="bg-white text-black text-sm rounded-md border border-gray-300 p-1 cursor-pointer">
                <option value="default">Default Light</option>
                <option value="glass">Glassmorphism</option>
                <option value="clay">Claymorphism</option>
                <option value="neobrut">Neo-Brutalism</option>
            </select>
            
            <!-- Dark/Light/Auto Toggle Icon -->
            <button id="modeToggleBtn" class="text-xl focus:outline-none" title="Toggle Dark/Light/Auto Mode">
                <span id="modeIconAuto" style="display:none;">🖥️</span>
                <span id="modeIconLight" style="display:none;">☀️</span>
                <span id="modeIconDark" style="display:none;">🌙</span>
            </button>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4">
        {% block content %}{% endblock %}
    </div>

    <script type="module" src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
