<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Synora Bridge{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <!-- Tailwind CSS Production Build -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind-output.css') }}">

    <!-- HTMX with Local Fallback -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>window.htmx || document.write(`<script src="{{ url_for('static', filename='vendor/htmx.min.js') }}"><\/script>`)</script>

    <!-- Highlight.js with Local Fallback -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/default.min.css" onerror="this.onerror=null; this.href=`{{ url_for('static', filename='vendor/highlight-default.min.css') }}`;">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script>window.hljs || document.write(`<script src="{{ url_for('static', filename='vendor/highlight.min.js') }}"><\/script>`)</script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    
    <style>
        /* Smooth transitions for sidebar elements */
        .sidebar-expanded .sidebar-text {
            opacity: 1;
            display: block;
        }
        .sidebar-collapsed .sidebar-text {
            opacity: 0;
            display: none;
        }
        .sidebar-collapsed {
            width: 4.5rem; /* ~72px */
        }
        .sidebar-expanded {
            width: 14rem; /* 224px */
        }
        /* Ensure theme nav styles are applied properly to sidebar */
        aside.theme-nav {
            border-right: 1px solid rgba(0,0,0,0.1);
        }
        .dark aside.theme-nav {
            border-right: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body data-initial-theme="{{ current_theme }}" class="font-sans antialiased {% if ui_layout == 'sidebar' %}flex h-screen overflow-hidden{% endif %}">
    <!-- Blocking script to prevent FOUC (Flash of Unstyled Content) -->
    <script>
        (function() {
            try {
                var initialConfig = document.body.getAttribute('data-initial-theme');
                initialConfig = initialConfig.replace(/'/g, '"');
                var config = JSON.parse(initialConfig);
                if (typeof config === 'string') config = JSON.parse(config);
                
                var theme = config.theme || 'default';
                var mode = config.colorMode || 'auto';
                var isDark = (mode === 'auto') 
                    ? window.matchMedia('(prefers-color-scheme: dark)').matches 
                    : (mode === 'dark');
                
                document.body.setAttribute('data-theme', theme);
                document.body.setAttribute('data-color-mode', isDark ? 'dark' : 'light');
                if (isDark) document.documentElement.classList.add('dark');
            } catch (e) {
                console.warn("FOUC prevention failed", e);
            }
        })();
    </script>
    
    {% if ui_layout == 'sidebar' %}
    <!-- SIDEBAR LAYOUT -->
    {% include 'partials/_sidebar.html' %}

    <!-- Main Content Area Wrapper -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative bg-transparent">
        <div class="flex-1 overflow-y-auto p-4 lg:p-8">
            <div class="container mx-auto">
    {% else %}
    <!-- TOP NAVBAR LAYOUT -->
    {% include 'partials/_topbar.html' %}

    <div class="container mx-auto mt-8 p-4 min-h-[calc(100vh-200px)]">
    {% endif %}
    
                <!-- SINGLE DECLARATION OF CONTENT BLOCK -->
                {% block content %}{% endblock %}

    {% if ui_layout == 'sidebar' %}
            </div>
        </div>
    </main>
    {% else %}
    </div>

    <footer class="theme-nav p-4 mt-12 text-center text-sm opacity-80">
        <p>&copy; 2026 Synora Bridge. All rights reserved. A product of <a href="https://SynoraStudio.in" target="_blank" class="hover:underline font-semibold transition-colors">SynoraStudio.in</a>.</p>
    </footer>
    {% endif %}

    <script src="{{ url_for('static', filename='js/push_handler.js') }}?v=4"></script>
    <script src="{{ url_for('static', filename='js/pull_rest_handler.js') }}?v=4"></script>
    <script src="{{ url_for('static', filename='js/pull_graphql_handler.js') }}?v=4"></script>
    <script type="module" src="{{ url_for('static', filename='js/theme.js') }}?v=4"></script>
    

</body>
</html>
