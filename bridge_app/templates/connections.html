{% extends "layout.html" %}

{% block content %}
<div x-data="connectionsManager()" class="max-w-4xl mx-auto space-y-6">
    <div class="flex justify-between items-center">
        <h2 class="text-3xl font-bold">Swagger Connections</h2>
        <button @click="showModal = true" class="theme-btn px-4 py-2 text-sm">
            + New Connection
        </button>
    </div>

    <!-- Connections List -->
    <div class="theme-panel p-6">
        <template x-if="connections.length === 0">
            <p class="theme-text-muted text-center py-4">No connections configured yet.</p>
        </template>
        
        <div class="space-y-4">
            <template x-for="conn in connections" :key="conn.id">
                <div class="border border-gray-200 dark:border-gray-700 rounded p-4 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-lg" x-text="conn.name"></h3>
                        <p class="text-sm theme-text-muted mt-1" x-text="conn.is_local_file ? 'Local File: ' + conn.local_file_path : 'URL: ' + conn.url"></p>
                        <p class="text-xs mt-1" x-text="'Last Updated: ' + (conn.last_updated ? new Date(conn.last_updated).toLocaleString() : 'Never')"></p>
                    </div>
                    <button @click="deleteConnection(conn.id)" class="text-red-500 hover:text-red-700 font-bold px-3 py-1 bg-red-100 dark:bg-red-900 rounded">
                        Delete
                    </button>
                </div>
            </template>
        </div>
    </div>

    <!-- Create Modal (Partial) -->
    {% include 'partials/add_connection_modal.html' %}
</div>

<script type="application/json" id="conns-data">
    {{ conns_json | safe }}
</script>

<script>
document.addEventListener('alpine:init', () => {
    let conns = [];
    try {
        conns = JSON.parse(document.getElementById('conns-data').textContent);
    } catch (e) {}

    Alpine.data('connectionsManager', () => ({
        connections: conns,
        showModal: false,
        loading: false,
        newConn: {
            name: '',
            url: '',
            is_local_file: false,
            local_file_path: '',
            json_content: ''
        },
        handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            this.newConn.local_file_path = file.name;
            const reader = new FileReader();
            reader.onload = (e) => {
                this.newConn.json_content = e.target.result;
            };
            reader.readAsText(file);
        },
        async saveConnection() {
            if (!this.newConn.name) {
                alert("Name is required"); return;
            }
            this.newConn.is_local_file = (this.newConn.is_local_file === 'true' || this.newConn.is_local_file === true);
            
            this.loading = true;
            try {
                const res = await fetch('/api/connections', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(this.newConn)
                });
                const saved = await res.json();
                this.connections.push(saved);
                this.showModal = false;
                this.newConn = {name: '', url: '', is_local_file: false, local_file_path: ''};
            } catch (e) {
                alert("Error saving connection");
            }
            this.loading = false;
        },
        async deleteConnection(id) {
            if(!confirm("Are you sure you want to delete this connection?")) return;
            try {
                await fetch('/api/connections/' + id, {method: 'DELETE'});
                this.connections = this.connections.filter(c => c.id !== id);
            } catch (e) {
                alert("Error deleting connection");
            }
        }
    }));
});
</script>
{% endblock %}
