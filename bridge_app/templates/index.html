{% extends "layout.html" %}

{% block content %}
<div id="scheduleDashboardContainer" class="h-full flex flex-col">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-3xl font-bold">Schedule Dashboard</h2>
            <p class="theme-text-muted">Monitor and manage your active data feeds.</p>
        </div>
        <div class="flex gap-3">
            <button id="bulkStartBtn" class="theme-btn px-4 py-2 text-sm bg-green-600 hover:bg-green-700 text-white" style="display: none;">Start Selected</button>
            <button id="bulkStopBtn" class="theme-btn px-4 py-2 text-sm bg-red-600 hover:bg-red-700 text-white" style="display: none;">Stop Selected</button>
            <a href="/templates/create" class="theme-btn px-4 py-2 text-sm" style="background: transparent; color: var(--text-main); box-shadow: none;">
                + New Schedule
            </a>
        </div>
    </div>

    <!-- Dashboard Table -->
    <div class="theme-panel flex-1 overflow-hidden flex flex-col">
        <div class="overflow-x-auto flex-1">
            <table class="w-full text-left border-collapse">
                <thead class="text-sm border-b border-black/10 theme-text-muted" style="background: rgba(0,0,0,0.03);">
                    <tr>
                        <th class="p-4 w-12 text-center" style="border-top-left-radius: inherit;">
                            <input type="checkbox" id="masterCheckbox" class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                        </th>
                        <th class="p-4">Client Name</th>
                        <th class="p-4">Template Used</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Interval</th>
                        <th class="p-4">Last Run</th>
                        <th class="p-4 text-right" style="border-top-right-radius: inherit;">Actions</th>
                    </tr>
                </thead>
                <tbody id="dashboardTableBody" class="divide-y divide-black/5"
                       hx-get="/htmx/dashboard/status"
                       hx-trigger="load, every 5s"
                       hx-swap="innerHTML">
                    <!-- HTMX will load the content here -->
                    <tr>
                        <td colspan="6" class="p-12 text-center theme-text-muted">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const selectedJobs = new Set();
        const masterCheckbox = document.getElementById('masterCheckbox');
        const bulkStartBtn = document.getElementById('bulkStartBtn');
        const bulkStopBtn = document.getElementById('bulkStopBtn');
        const tableBody = document.getElementById('dashboardTableBody');

        function updateUI() {
            const hasSelection = selectedJobs.size > 0;
            bulkStartBtn.style.display = hasSelection ? 'inline-block' : 'none';
            bulkStopBtn.style.display = hasSelection ? 'inline-block' : 'none';
            
            const allCheckboxes = Array.from(document.querySelectorAll('.job-checkbox'));
            if (allCheckboxes.length > 0) {
                masterCheckbox.checked = allCheckboxes.every(cb => selectedJobs.has(cb.value));
            } else {
                masterCheckbox.checked = false;
            }
        }

        // Handle Master Checkbox click
        masterCheckbox.addEventListener('change', (e) => {
            const isChecked = e.target.checked;
            document.querySelectorAll('.job-checkbox').forEach(cb => {
                cb.checked = isChecked;
                if (isChecked) {
                    selectedJobs.add(cb.value);
                } else {
                    selectedJobs.delete(cb.value);
                }
            });
            updateUI();
        });

        // Handle individual checkbox clicks using delegation
        tableBody.addEventListener('change', (e) => {
            if (e.target.classList.contains('job-checkbox')) {
                if (e.target.checked) {
                    selectedJobs.add(e.target.value);
                } else {
                    selectedJobs.delete(e.target.value);
                }
                updateUI();
            }
        });

        // Restore state after HTMX swap
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            if (evt.detail.target.id === 'dashboardTableBody') {
                document.querySelectorAll('.job-checkbox').forEach(cb => {
                    if (selectedJobs.has(cb.value)) {
                        cb.checked = true;
                    }
                });
                updateUI();
            }
        });

        // Handle Bulk Actions
        async function handleBulkAction(action) {
            if (selectedJobs.size === 0) return;
            
            const count = selectedJobs.size;
            if (!confirm(`Are you sure you want to ${action} the ${count} selected schedule(s)?`)) {
                return;
            }
            
            const jobIds = Array.from(selectedJobs).join(',');
            
            const formData = new FormData();
            formData.append('action', action);
            formData.append('job_ids', jobIds);
            
            try {
                const response = await fetch('/htmx/dashboard/jobs/bulk_toggle', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const html = await response.text();
                    tableBody.innerHTML = html;
                    
                    // Re-apply selections
                    document.querySelectorAll('.job-checkbox').forEach(cb => {
                        if (selectedJobs.has(cb.value)) {
                            cb.checked = true;
                        }
                    });
                    updateUI();
                } else {
                    alert('Failed to execute bulk action. Please make sure you restarted the Python server!');
                }
            } catch (err) {
                console.error("Bulk action failed", err);
                alert('An error occurred. Please ensure your python server is restarted.');
            }
        }

        bulkStartBtn.addEventListener('click', () => handleBulkAction('start'));
        bulkStopBtn.addEventListener('click', () => handleBulkAction('stop'));
    });
</script>
{% endblock %}
