{% extends "layout.html" %}

{% block content %}
<div id="scheduleDashboardContainer" class="h-full flex flex-col">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-3xl font-bold">Schedule Dashboard</h2>
            <p class="theme-text-muted">Monitor and manage your active data feeds.</p>
        </div>
        <a href="/templates/create" class="theme-btn px-4 py-2 text-sm" style="background: transparent; color: var(--text-main); box-shadow: none;">
            + New Schedule
        </a>
    </div>

    <!-- Dashboard Table -->
    <div class="theme-panel flex-1 overflow-hidden flex flex-col">
        <div class="overflow-x-auto flex-1">
            <table class="w-full text-left border-collapse">
                <thead class="text-sm border-b border-black/10 theme-text-muted" style="background: rgba(0,0,0,0.03);">
                    <tr>
                        <th class="p-4" style="border-top-left-radius: inherit;">Client Name</th>
                        <th class="p-4">Template Used</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">Interval</th>
                        <th class="p-4">Last Run</th>
                        <th class="p-4 text-right" style="border-top-right-radius: inherit;">Actions</th>
                    </tr>
                </thead>
                <tbody id="dashboardTableBody" class="divide-y divide-black/5"
                       hx-get="/htmx/dashboard/status"
                       hx-trigger="load, every 5s"
                       hx-swap="innerHTML">
                    <!-- HTMX will load the content here -->
                    <tr>
                        <td colspan="6" class="p-12 text-center theme-text-muted">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
