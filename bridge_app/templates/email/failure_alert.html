<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
      }
      .container {
        max-width: 600px;
        margin: 20px auto;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background-color: #f9f9f9;
      }
      .error-box {
        background: #f8d7da;
        color: #721c24;
        padding: 15px;
        border-radius: 5px;
        border-left: 5px solid #dc3545;
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      h2 {
        color: #dc3545;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Schedule Failure Alert</h2>
      <p>A scheduled push job has failed to execute successfully.</p>
      
      <p><strong>Job ID:</strong> {{ job_id }}</p>
      <p><strong>Template:</strong> {{ template_name }}</p>
      <p><strong>Destination:</strong> {{ dest_url }}</p>
      <p><strong>Timestamp:</strong> {{ timestamp }}</p>
      
      <hr>
      
      <h3>Error Details:</h3>
      <pre class="error-box">{{ error_msg }}</pre>
      
      <p style="font-size: 0.9em; color: #777; margin-top: 30px;">
        This is an automated message from the API Bridge Universal Engine.
      </p>
    </div>
  </body>
</html>
