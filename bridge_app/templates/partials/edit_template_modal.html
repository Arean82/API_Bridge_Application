    <!-- Unified Modal for Clone & Edit -->
    <div id="editTemplateModal" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center">
        <!-- Backdrop -->
        <div id="editModalBackdrop" class="absolute inset-0 -z-10 [background:var(--overlay-bg)] [backdrop-filter:var(--backdrop)]"></div>

        <!-- Modal Content -->
        <div class="theme-panel flex flex-col w-[600px] max-h-[90vh] z-10 shadow-2xl overflow-hidden relative">

            <div class="p-6 border-b border-black/10 flex justify-between items-center bg-gray-50/50">
                <h3 id="templateModalTitle" class="text-xl font-bold">Edit Template</h3>
                <button id="closeEditModalBtn" class="theme-text-muted hover:text-black">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <div class="p-6 overflow-y-auto space-y-8 flex-1 bg-white">

                <!-- Template Name -->
                <div>
                    <label class="block text-sm font-medium mb-1">Template Name</label>
                    <input type="text" id="templateName" class="theme-input w-full p-2.5 text-sm" placeholder="e.g. Shopify Orders Feed">
                </div>

                <hr class="border-black/5">

                <!-- Source (Partner) API Section -->
                <div class="space-y-4">
                    <div class="flex justify-between items-end">
                        <h4 class="font-bold text-gray-800">Source Configuration</h4>
                        <div class="flex items-center gap-4">
                            <label id="editSourceWrapper" class="flex items-center space-x-2 text-sm theme-text-muted cursor-pointer" style="display: none;">
                                <input type="checkbox" id="editSourceCheckbox" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                                <span>Edit Sources</span>
                            </label>
                            <button id="addSourceBtn" class="theme-btn px-3 py-1 text-xs rounded" style="display: none;">+ Add Endpoint</button>
                        </div>
                    </div>

                    <div id="sourcesContainer">
                        <!-- Source elements dynamically populated by Vanilla JS / HTMX -->
                    </div>
                </div>

                <hr class="border-black/5">

                <!-- Destination (Client) API Section -->
                <div class="space-y-4">
                    <h4 class="font-bold text-gray-800">Destination Configuration</h4>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2 grid grid-cols-2 gap-4 mb-4">
                            <div class="col-span-2 flex justify-between items-end border-b border-black/10 pb-2 mb-2 gap-4">
                                <div class="w-1/2">
                                    <label class="block text-sm font-medium mb-1">Mode of Operation</label>
                                    <select id="executionModeModal" class="theme-input w-full p-2.5 text-sm" disabled>
                                        <option value="push">Scheduled Push</option>
                                        <option value="pull_rest">On-Demand Pull (REST)</option>
                                        <option value="pull_graphql">On-Demand Pull (GraphQL)</option>
                                    </select>
                                </div>
                                <div class="w-1/2" id="globalTokenWrapperModal" style="display: none;">
                                    <label class="block text-sm font-medium mb-1">Global Security Token (Bearer)</label>
                                    <div class="relative">
                                        <input type="password" id="globalSecurityTokenModal" class="theme-input w-full p-2.5 pr-10 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Leave empty for no auth">
                                        <button type="button" id="toggleGlobalTokenBtnModal" class="absolute inset-y-0 right-0 pr-3 flex items-center theme-text-muted hover:opacity-75">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-span-2 mt-4">
                                <div id="pushConfigBlockModal">
                                    {% include 'partials/edit_push.html' %}
                                </div>
                                
                                <div id="pullRestConfigBlockModal" style="display: none;">
                                    {% include 'partials/edit_pull_rest.html' %}
                                </div>
                                
                                <div id="pullGraphqlConfigBlockModal" style="display: none;">
                                    {% include 'partials/edit_pull_graphql.html' %}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="p-4 border-t border-black/10 bg-gray-50/50 flex justify-end gap-3">
                <button id="cancelEditModalBtn" class="px-4 py-2 rounded text-sm font-medium theme-text-muted hover:bg-black/5 transition">Cancel</button>
                <button id="saveTemplateBtn" class="theme-btn px-6 py-2 text-sm font-medium">Save Configuration</button>
            </div>

        </div>
    </div>
</div>
