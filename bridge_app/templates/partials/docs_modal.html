<!-- HTML Modal for Docs (Client Side Markdown Rendering) -->
<div id="docs-modal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog"
    aria-modal="true">
    <div class="flex min-h-screen items-center justify-center p-4 text-center sm:p-0">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity"
            onclick="document.getElementById('docs-modal').classList.add('hidden')"></div>

        <div
            class="theme-panel relative transform overflow-hidden text-left transition-all sm:my-8 sm:w-full sm:max-w-4xl flex flex-col h-[80vh]">
            <div class="px-4 pt-5 pb-4 sm:p-6 sm:pb-4 flex flex-col h-full bg-transparent">
                <div class="flex justify-between items-center mb-4 shrink-0">
                    <div class="flex items-center space-x-4">
                        <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-white" id="modal-title">README
                        </h3>
                        <!-- Manual Buttons for Specific Readme Files -->
                        <button onclick="loadReadme('README.md')" data-file="README.md"
                            class="readme-btn px-3 py-1 bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white rounded text-sm hover:bg-gray-300 dark:hover:bg-gray-600">Main
                            README</button>
                        <button onclick="loadReadme('user_manual.md')" data-file="user_manual.md"
                            class="readme-btn px-3 py-1 bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white rounded text-sm hover:bg-gray-300 dark:hover:bg-gray-600">User
                            Manual</button>
                        <button onclick="loadReadme('INSTALLATION_MANUAL.md')" data-file="INSTALLATION_MANUAL.md"
                            class="readme-btn px-3 py-1 bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white rounded text-sm hover:bg-gray-300 dark:hover:bg-gray-600">Install
                            Guide</button>
                        <button onclick="loadReadme('SCALING_REDIS_MEMURAI.md')" data-file="SCALING_REDIS_MEMURAI.md"
                            class="readme-btn px-3 py-1 bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white rounded text-sm hover:bg-gray-300 dark:hover:bg-gray-600">Scaling</button>
                        <button onclick="loadReadme('SECURITY.md')" data-file="SECURITY.md"
                            class="readme-btn px-3 py-1 bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-white rounded text-sm hover:bg-gray-300 dark:hover:bg-gray-600">Security</button>
                    </div>
                    <button type="button" onclick="document.getElementById('docs-modal').classList.add('hidden')"
                        class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-1.5 px-4 rounded transition text-sm">
                        Close
                    </button>
                </div>
                <div
                    class="mt-2 flex-grow overflow-y-auto p-6 bg-gray-50 dark:bg-gray-900 rounded border border-gray-200 dark:border-gray-700">
                    <!-- GitHub Markdown CSS for guaranteed styling -->
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown.min.css">
                    <style>
                        .markdown-body {
                            box-sizing: border-box;
                            min-width: 200px;
                            max-width: 980px;
                            margin: 0 auto;
                            padding: 15px;
                            background-color: transparent;
                        }
                        .dark .markdown-body {
                            color: #e5e7eb !important;
                        }
                        .dark .markdown-body h1, .dark .markdown-body h2, .dark .markdown-body h3, .dark .markdown-body h4, .dark .markdown-body h5, .dark .markdown-body h6 {
                            color: #f3f4f6 !important;
                            border-bottom-color: #374151 !important;
                        }
                        .dark .markdown-body code {
                            background-color: #374151 !important;
                            color: #e5e7eb !important;
                        }
                        .dark .markdown-body pre {
                            background-color: #1f2937 !important;
                        }
                        .dark .markdown-body pre code {
                            background-color: transparent !important;
                        }
                        .dark .markdown-body a {
                            color: #60a5fa !important;
                        }
                        .dark .markdown-body table tr, .dark .markdown-body table tr:nth-child(2n) {
                            background-color: transparent !important;
                        }
                        .dark .markdown-body table th, .dark .markdown-body table td {
                            border-color: #374151 !important;
                        }
                        .dark .markdown-body blockquote {
                            color: #9ca3af !important;
                            border-left-color: #374151 !important;
                        }
                        .dark .markdown-body img {
                            background-color: transparent !important;
                        }
                    </style>
                    <div id="markdown-container" class="markdown-body text-gray-800 dark:text-gray-200">
                        Loading documentation...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Local JS for Markdown (Now fully modular) -->
<script src="{{ url_for('static', filename='vendor/marked.min.js') }}"></script>
<script>
    function loadReadme(filename) {
        // Highlight active button
        document.querySelectorAll('.readme-btn').forEach(btn => {
            if (btn.dataset.file === filename) {
                btn.classList.remove('bg-gray-200', 'dark:bg-gray-700', 'text-gray-900', 'dark:text-white', 'hover:bg-gray-300', 'dark:hover:bg-gray-600');
                btn.classList.add('bg-indigo-600', 'text-white', 'hover:bg-indigo-700');
            } else {
                btn.classList.remove('bg-indigo-600', 'text-white', 'hover:bg-indigo-700');
                btn.classList.add('bg-gray-200', 'dark:bg-gray-700', 'text-gray-900', 'dark:text-white', 'hover:bg-gray-300', 'dark:hover:bg-gray-600');
            }
        });

        const container = document.getElementById('markdown-container');
        container.innerHTML = "Loading...";
        fetch('/htmx/docs/' + filename)
            .then(response => response.text())
            .then(text => {
                container.innerHTML = marked.parse(text);
            })
            .catch(err => {
                container.innerHTML = "Error loading readme: " + err;
            });
    }
</script>
