<!-- Create Modal -->
<div id="addConnectionModal" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center">
    <!-- Backdrop -->
    <div id="addConnectionBackdrop" class="absolute inset-0 -z-10 [background:var(--overlay-bg)] [backdrop-filter:var(--backdrop)]"></div>

    <!-- Modal Content -->
    <div class="theme-panel p-4 max-w-3xl w-full m-4 relative z-10">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Left Column -->
            <div>
                <h3 id="addConnectionTitle" class="text-base font-bold mb-3">Add Swagger Connection</h3>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium mb-1">Connection Name</label>
                        <input type="text" id="connName" class="theme-input w-full p-1.5 text-sm" placeholder="e.g. Partner Tracking API">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-medium mb-1">Source Type</label>
                        <select id="connIsLocalFile" class="theme-input w-full p-1.5 text-sm">
                            <option value="false">Remote URL</option>
                            <option value="true">Upload Local JSON File</option>
                        </select>
                    </div>

                    <div id="connRemoteSection">
                        <label class="block text-xs font-medium mb-1">Swagger JSON URL</label>
                        <input type="text" id="connUrl" class="theme-input w-full p-1.5 text-sm" placeholder="https://api.partner.com/docs.json">
                    </div>

                    <div id="connLocalSection" style="display: none;">
                        <label class="block text-xs font-medium mb-1">Base API URL <span class="text-red-500">*</span></label>
                        <input type="text" id="connBaseUrl" class="theme-input w-full p-1.5 text-sm mb-2" placeholder="https://api.partner.com">
                        
                        <label class="block text-xs font-medium mb-1">Upload Local File</label>
                        <input type="file" id="connFileInput" accept=".json" class="theme-input w-full p-1.5 text-xs">
                        <p id="connFileStatus" class="text-xs theme-text-muted mt-1"></p>
                    </div>
                </div>
            </div>
            
            <!-- Right Column -->
            <div class="pt-8">
                <h4 class="text-sm font-semibold mb-2">Advanced Settings (Optional)</h4>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium mb-1">Authorization Token (Bearer/API Key)</label>
                        <input type="password" id="connAuthToken" class="theme-input w-full p-1.5 text-sm" placeholder="Bearer eyJhbGciOiJIUzI1...">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-medium mb-1">Auto-Sync Schedule</label>
                        <select id="connSyncSchedule" class="theme-input w-full p-1.5 text-sm">
                            <option value="">None (Manual Refresh Only)</option>
                            <option value="hourly">Every Hour</option>
                            <option value="daily">Every Day</option>
                            <option value="weekly">Every Week</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-medium mb-1">Custom Environments (JSON array of URLs)</label>
                        <input type="text" id="connEnvironments" class="theme-input w-full p-1.5 text-sm" placeholder='["https://dev.api.com", "https://prod.api.com"]'>
                    </div>
                </div>
                
                <div class="flex justify-end space-x-2 mt-6">
                    <button id="cancelConnectionBtn" class="px-3 py-1.5 border border-gray-300 rounded hover:bg-gray-100 dark:hover:bg-gray-800 text-sm">Cancel</button>
                    <button id="saveConnectionBtn" class="theme-btn px-3 py-1.5 text-sm">
                        <span id="saveConnectionText">Save Connection</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
