<!-- Create Modal Wrapper -->
<div id="addConnectionModal" style="display: none;" class="fixed inset-0 z-50 flex items-center justify-center">
    <!-- Backdrop -->
    <div id="addConnectionBackdrop" class="absolute inset-0 -z-10 [background:var(--overlay-bg)] [backdrop-filter:var(--backdrop)]"></div>

    <!-- Modal Content -->
    <div class="theme-panel p-6 max-w-4xl w-full m-4 relative z-10 max-h-[90vh] overflow-y-auto">
        <h3 id="addConnectionTitle" class="text-xl font-bold mb-6 border-b border-gray-200 dark:border-gray-700 pb-2">Add Connection</h3>
        
        <div class="mb-6">
            <label class="block text-sm font-medium mb-2">Connection Type</label>
            <div class="flex gap-6">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="connType" value="rest" class="conn-type-radio w-4 h-4 text-indigo-600 focus:ring-indigo-500 border-gray-300" checked>
                    <span class="text-sm font-medium">REST API (Swagger)</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="connType" value="graphql" class="conn-type-radio w-4 h-4 text-indigo-600 focus:ring-indigo-500 border-gray-300">
                    <span class="text-sm font-medium">GraphQL</span>
                </label>
            </div>
        </div>

        <!-- Inject the truly modular partials here -->
        {% include 'partials/add_connection_rest.html' %}
        {% include 'partials/add_connection_graphql.html' %}
        
        <div class="flex justify-end space-x-3 mt-8 pt-4 border-t border-gray-200 dark:border-gray-700">
            <button id="cancelConnectionBtn" class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-100 dark:hover:bg-gray-800 text-sm font-medium">Cancel</button>
            <button id="validateConnectionBtn" style="display: none;" class="px-4 py-2 bg-yellow-500 hover:bg-yellow-600 text-white rounded text-sm font-medium transition-colors">Test / Validate</button>
            <button id="saveConnectionBtn" class="theme-btn px-4 py-2 text-sm font-medium">
                <span id="saveConnectionText">Save Connection</span>
            </button>
        </div>
    </div>
</div>
