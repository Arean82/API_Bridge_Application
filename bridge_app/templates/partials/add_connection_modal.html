<!-- Create Modal -->
<div x-show="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50" style="display: none;">
    <div class="theme-panel p-6 max-w-lg w-full m-4">
        <h3 class="text-xl font-bold mb-4">Add Swagger Connection</h3>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Connection Name</label>
                <input type="text" x-model="newConn.name" class="theme-input w-full p-2" placeholder="e.g. Partner Tracking API">
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-1">Source Type</label>
                <select x-model="newConn.is_local_file" class="theme-input w-full p-2">
                    <option value="false">Remote URL</option>
                    <option value="true">Upload Local JSON File</option>
                </select>
            </div>

            <div x-show="newConn.is_local_file == 'false' || newConn.is_local_file === false">
                <label class="block text-sm font-medium mb-1">Swagger JSON URL</label>
                <input type="text" x-model="newConn.url" class="theme-input w-full p-2" placeholder="https://api.partner.com/docs.json">
            </div>

            <div x-show="newConn.is_local_file == 'true' || newConn.is_local_file === true">
                <label class="block text-sm font-medium mb-1">Upload Local File</label>
                <input type="file" @change="handleFileUpload" accept=".json" class="theme-input w-full p-2 text-sm">
                <p class="text-xs theme-text-muted mt-1" x-text="newConn.local_file_path ? 'File ready: ' + newConn.local_file_path : ''"></p>
            </div>
        </div>
        
        <div class="flex justify-end space-x-3 mt-6">
            <button @click="showModal = false" class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-100 dark:hover:bg-gray-800">Cancel</button>
            <button @click="saveConnection()" class="theme-btn px-4 py-2" :disabled="loading">
                <span x-text="loading ? 'Saving...' : 'Save Connection'"></span>
            </button>
        </div>
    </div>
</div>
