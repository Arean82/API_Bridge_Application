<form hx-post="/htmx/email_templates/{{ filename }}" hx-target="#template-editor-content" class="flex flex-col h-full w-full">
    <!-- Toolbar -->
    <div class="px-4 py-3 border-b border-black/10 flex justify-between items-center" style="background: rgba(0,0,0,0.01);">
        <div class="font-medium text-sm text-indigo-600 flex items-center">
            Editing: <span class="ml-2 font-bold">{{ filename }}</span>
        </div>
        
        <div class="flex space-x-2">
            <!-- Toggle Group -->
            <div class="flex bg-gray-200 dark:bg-gray-700 rounded p-1">
                <button type="button" id="btn-code-view" class="px-3 py-1 text-sm font-medium rounded bg-white dark:bg-gray-600 shadow-sm text-gray-800 dark:text-white transition">Code</button>
                <button type="button" id="btn-preview-view" class="px-3 py-1 text-sm font-medium rounded text-gray-600 dark:text-gray-300 hover:text-gray-800 dark:hover:text-white transition">Preview</button>
            </div>
            
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-1 px-4 rounded text-sm shadow transition">
                Save Template
            </button>
        </div>
    </div>
    
    <!-- Status Message (Injected by HTMX on save) -->
    {% if success_msg %}
    <div class="bg-green-100 text-green-800 text-sm p-2 text-center border-b border-green-200">
        {{ success_msg }}
    </div>
    {% endif %}
    {% if error_msg %}
    <div class="bg-red-100 text-red-800 text-sm p-2 text-center border-b border-red-200">
        {{ error_msg }}
    </div>
    {% endif %}

    <!-- Editor Textarea and Preview Iframe -->
    <div class="flex-1 p-4 bg-black/5 dark:bg-white/5 relative flex flex-col">
        <textarea id="template-textarea" name="template_content" 
            class="flex-1 w-full p-4 font-mono text-sm border border-gray-300 dark:border-gray-600 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white dark:bg-gray-800 dark:text-white"
            spellcheck="false">{{ content }}</textarea>
            
        <iframe id="template-preview" class="flex-1 w-full border border-gray-300 dark:border-gray-600 rounded bg-white hidden" title="Email Preview"></iframe>
    </div>
    
    <!-- Helper Text -->
    <div class="px-4 py-2 border-t border-black/10 text-xs theme-text-muted" style="background: rgba(0,0,0,0.02);">
        Use <code class="bg-black/10 px-1 rounded">{{ '{{ variable }}' }}</code> to inject dynamic variables (e.g. <code>{{ '{{ job_id }}' }}</code>, <code>{{ '{{ error_msg }}' }}</code>). Uses standard HTML and Jinja2 syntax.
    </div>

    <!-- Toggle Script -->
    <script>
        (function() {
            const btnCode = document.getElementById('btn-code-view');
            const btnPreview = document.getElementById('btn-preview-view');
            const textarea = document.getElementById('template-textarea');
            const iframe = document.getElementById('template-preview');
            
            function showCode() {
                btnCode.classList.add('bg-white', 'dark:bg-gray-600', 'shadow-sm', 'text-gray-800', 'dark:text-white');
                btnCode.classList.remove('text-gray-600', 'dark:text-gray-300');
                
                btnPreview.classList.remove('bg-white', 'dark:bg-gray-600', 'shadow-sm', 'text-gray-800', 'dark:text-white');
                btnPreview.classList.add('text-gray-600', 'dark:text-gray-300');
                
                textarea.classList.remove('hidden');
                iframe.classList.add('hidden');
            }
            
            function showPreview() {
                btnPreview.classList.add('bg-white', 'dark:bg-gray-600', 'shadow-sm', 'text-gray-800', 'dark:text-white');
                btnPreview.classList.remove('text-gray-600', 'dark:text-gray-300');
                
                btnCode.classList.remove('bg-white', 'dark:bg-gray-600', 'shadow-sm', 'text-gray-800', 'dark:text-white');
                btnCode.classList.add('text-gray-600', 'dark:text-gray-300');
                
                // Inject raw HTML into iframe
                // Replace Jinja2 variables with sample text so they don't look broken
                let htmlContent = textarea.value;
                
                const reJobId = new RegExp('\\{\\{\\s*job_id\\s*\\}\\}', 'g');
                htmlContent = htmlContent.replace(reJobId, "JOB-1234");
                
                const reTplName = new RegExp('\\{\\{\\s*template_name\\s*\\}\\}', 'g');
                htmlContent = htmlContent.replace(reTplName, "Demo Template");
                
                const reDestUrl = new RegExp('\\{\\{\\s*dest_url\\s*\\}\\}', 'g');
                htmlContent = htmlContent.replace(reDestUrl, "https://api.example.com/webhook");
                
                const reTimestamp = new RegExp('\\{\\{\\s*timestamp\\s*\\}\\}', 'g');
                htmlContent = htmlContent.replace(reTimestamp, new Date().toLocaleString());
                
                const reErrorMsg = new RegExp('\\{\\{\\s*error_msg\\s*\\}\\}', 'g');
                htmlContent = htmlContent.replace(reErrorMsg, "500 Internal Server Error\\nConnection Refused.");
                
                iframe.srcdoc = htmlContent;
                
                textarea.classList.add('hidden');
                iframe.classList.remove('hidden');
            }
            
            btnCode.addEventListener('click', showCode);
            btnPreview.addEventListener('click', showPreview);
        })();
    </script>
</form>
