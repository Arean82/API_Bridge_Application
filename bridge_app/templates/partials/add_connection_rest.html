<div id="restConnBlock" style="display: block;">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Left Column -->
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-medium mb-1">Connection Name</label>
                <input type="text" id="restConnName" class="theme-input w-full p-2 text-sm" placeholder="e.g. Payment Gateway API">
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">API Specification Source <span class="text-red-500">*</span></label>
                    <select id="restConnIsLocalFile" class="theme-input w-full p-2 text-sm">
                        <option value="false">Remote URL</option>
                        <option value="true">Upload File</option>
                        <option value="paste">Paste Specification</option>
                    </select>
                </div>
                
                <!-- Remote URL Option -->
                <div id="restConnUrlSection" class="bg-gray-50 dark:bg-gray-800 p-4 rounded border border-gray-200 dark:border-gray-700">
                    <label id="restConnUrlLabel" class="block text-xs font-medium mb-1">OpenAPI / Swagger URL <span class="text-red-500">*</span></label>
                    <input type="text" id="restConnUrl" class="theme-input w-full p-1.5 text-xs" placeholder="https://api.example.com/openapi.json">
                    <p class="text-[10px] theme-text-muted mt-1">Supports Swagger 2.0, OpenAPI 3.0.x, 3.1.x, and 3.2.x</p>
                </div>

                <!-- Upload File Option -->
                <div id="restConnLocalSection" style="display: none;" class="bg-gray-50 dark:bg-gray-800 p-4 rounded border border-gray-200 dark:border-gray-700">
                    <label class="block text-xs font-medium mb-1">Specification File <span class="text-red-500">*</span></label>
                    <div class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-md p-6 text-center cursor-pointer hover:border-indigo-500 hover:bg-black/5 transition" onclick="document.getElementById('restConnFileInput').click()">
                        <p class="text-sm theme-text-muted">Drop file here or click to browse</p>
                        <p class="text-xs theme-text-muted mt-1">JSON, YAML or YML</p>
                        <input type="file" id="restConnFileInput" accept=".json,.yaml,.yml" class="hidden">
                    </div>
                    <p id="restConnFileStatus" class="text-xs theme-text-muted mt-2 font-mono break-all"></p>
                </div>
                
                <!-- Paste Option -->
                <div id="restConnPasteSection" style="display: none;" class="bg-gray-50 dark:bg-gray-800 p-4 rounded border border-gray-200 dark:border-gray-700">
                    <label class="block text-xs font-medium mb-1">OpenAPI / Swagger Specification <span class="text-red-500">*</span></label>
                    <textarea id="restConnPastedSpec" class="theme-input w-full p-2 text-xs font-mono h-40" placeholder="openapi: 3.1.0&#10;info:&#10;  title: Vehicle Management API"></textarea>
                </div>

                <!-- Base API URL for Local/Paste -->
                <div id="restConnBaseUrlSection" style="display: none;" class="bg-gray-50 dark:bg-gray-800 p-4 rounded border border-gray-200 dark:border-gray-700">
                    <label class="block text-xs font-medium mb-1">Base API URL <span class="text-red-500">*</span></label>
                    <input type="text" id="restConnBaseUrl" class="theme-input w-full p-1.5 text-xs" placeholder="https://api.example.com">
                    <p class="text-[10px] theme-text-muted mt-1">Required to resolve paths correctly for local/pasted specifications.</p>
                </div>

                <!-- Validation Result Block -->
                <div id="restConnValidationResult" style="display: none;" class="p-3 rounded-md text-sm border">
                    <!-- Injected via JS -->
                </div>
            </div>
        </div>
        
        <!-- Right Column -->
        <div>
            <h4 class="text-base font-semibold mb-4 border-b border-gray-200 dark:border-gray-700 pb-1">Advanced Settings (Optional)</h4>
            
            <div class="space-y-5">
                <!-- Authentication Section -->
                <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded border border-gray-200 dark:border-gray-700 space-y-3">
                    <div class="flex items-center justify-between border-b border-gray-200 dark:border-gray-700 pb-2 mb-2">
                        <label class="text-sm font-semibold">Upstream API Authentication</label>
                        <label class="flex items-center gap-2 cursor-pointer text-xs">
                            <input type="checkbox" id="restConnSameAuth" checked class="w-3.5 h-3.5 text-indigo-600 focus:ring-indigo-500 rounded border-gray-300">
                            <span class="theme-text-muted">Same Auth for Spec URL</span>
                        </label>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Authentication Type</label>
                        <select id="restConnAuthType" class="theme-input w-full p-2 text-sm">
                            <option value="none">None</option>
                            <option value="bearer">Bearer Token</option>
                            <option value="api_key">API Key</option>
                            <option value="basic">Basic Authentication</option>
                        </select>
                    </div>
                    
                    <div id="restConnAuthBearerSection" style="display: none;">
                        <label class="block text-xs font-medium mb-1">Bearer Token</label>
                        <input type="password" id="restConnAuthBearerToken" class="theme-input w-full p-1.5 text-xs" placeholder="eyJhbGciOiJIUzI1...">
                    </div>
                    
                    <div id="restConnAuthApiKeySection" style="display: none;" class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-medium mb-1">Header Name</label>
                            <input type="text" id="restConnAuthApiKeyName" class="theme-input w-full p-1.5 text-xs" placeholder="X-API-Key">
                        </div>
                        <div>
                            <label class="block text-xs font-medium mb-1">API Key</label>
                            <input type="password" id="restConnAuthApiKeyValue" class="theme-input w-full p-1.5 text-xs" placeholder="your-api-key">
                        </div>
                    </div>
                    
                    <div id="restConnAuthBasicSection" style="display: none;" class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-medium mb-1">Username</label>
                            <input type="text" id="restConnAuthBasicUsername" class="theme-input w-full p-1.5 text-xs" placeholder="admin">
                        </div>
                        <div>
                            <label class="block text-xs font-medium mb-1">Password</label>
                            <input type="password" id="restConnAuthBasicPassword" class="theme-input w-full p-1.5 text-xs" placeholder="••••••••">
                        </div>
                    </div>
                </div>
                
                <!-- Spec Authentication Section -->
                <div id="restConnSpecAuthBlock" style="display: none;" class="bg-gray-50 dark:bg-gray-800 p-4 rounded border border-gray-200 dark:border-gray-700 space-y-3">
                    <div class="border-b border-gray-200 dark:border-gray-700 pb-2 mb-2">
                        <label class="text-sm font-semibold">Spec URL Authentication</label>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Authentication Type</label>
                        <select id="restConnSpecAuthType" class="theme-input w-full p-2 text-sm">
                            <option value="none">None</option>
                            <option value="bearer">Bearer Token</option>
                            <option value="api_key">API Key</option>
                            <option value="basic">Basic Authentication</option>
                        </select>
                    </div>
                    
                    <div id="restConnSpecAuthBearerSection" style="display: none;">
                        <label class="block text-xs font-medium mb-1">Bearer Token</label>
                        <input type="password" id="restConnSpecAuthBearerToken" class="theme-input w-full p-1.5 text-xs" placeholder="eyJhbGciOiJIUzI1...">
                    </div>
                    
                    <div id="restConnSpecAuthApiKeySection" style="display: none;" class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-medium mb-1">Header Name</label>
                            <input type="text" id="restConnSpecAuthApiKeyName" class="theme-input w-full p-1.5 text-xs" placeholder="X-API-Key">
                        </div>
                        <div>
                            <label class="block text-xs font-medium mb-1">API Key</label>
                            <input type="password" id="restConnSpecAuthApiKeyValue" class="theme-input w-full p-1.5 text-xs" placeholder="your-api-key">
                        </div>
                    </div>
                    
                    <div id="restConnSpecAuthBasicSection" style="display: none;" class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-medium mb-1">Username</label>
                            <input type="text" id="restConnSpecAuthBasicUsername" class="theme-input w-full p-1.5 text-xs" placeholder="admin">
                        </div>
                        <div>
                            <label class="block text-xs font-medium mb-1">Password</label>
                            <input type="password" id="restConnSpecAuthBasicPassword" class="theme-input w-full p-1.5 text-xs" placeholder="••••••••">
                        </div>
                    </div>
                </div>
                
                <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded border border-gray-200 dark:border-gray-700">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium">Custom Headers</label>
                        <button type="button" id="restConnAddHeaderBtn" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium">+ Add Header</button>
                    </div>
                    <div id="restConnCustomHeadersContainer" class="space-y-2 max-h-32 overflow-y-auto">
                        <!-- Header rows go here -->
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Auto-Sync Schedule</label>
                    <select id="restConnSyncSchedule" class="theme-input w-full p-2 text-sm">
                        <option value="">None (Manual Refresh Only)</option>
                        <option value="hourly">Every Hour</option>
                        <option value="daily">Every Day</option>
                        <option value="weekly">Every Week</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
</div>
