<!-- GraphQL Connections -->
<div id="pane-graphql" class="conn-pane space-y-4 hidden">
    {% set graphql_conns = [] %}
    {% for conn in connections %}
        {% if conn.connection_type == 'graphql' %}
            {% set _ = graphql_conns.append(conn) %}
            {{ render_connection(conn) }}
        {% endif %}
    {% endfor %}
    {% if not graphql_conns %}
        <p class="text-sm theme-text-muted italic">No GraphQL connections found.</p>
    {% endif %}
</div>
