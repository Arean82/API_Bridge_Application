<div id="clientPane" class="theme-panel flex flex-col w-2/3">
    <div class="p-4 border-b border-black/10 flex justify-between items-center">
        <h3 class="font-bold">Destination (Client API)</h3>
        <button id="toggleRightFullBtn" class="theme-text-muted hover:opacity-75">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
        </button>
    </div>
    
    <div class="p-6 flex-1 overflow-y-auto space-y-6">
        <!-- Client Config -->
        <div class="grid grid-cols-2 gap-4">
            <div class="col-span-2">
                <label class="block text-sm font-medium mb-1">Destination URL</label>
                <input type="text" id="clientUrl" class="theme-input w-full p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="https://api.client.com/ingest">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Auth Type</label>
                <select id="clientAuthType" class="theme-input w-full p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="none">None</option>
                    <option value="bearer">Bearer Token</option>
                </select>
            </div>
            <div id="clientAuthTokenWrapper" style="display: none;">
                <label class="block text-sm font-medium mb-1">Auth Token</label>
                <input type="password" id="clientAuthToken" class="theme-input w-full p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
        </div>

        <!-- Field Mapping Builder -->
        <div class="mt-8">
            <div class="flex justify-between items-center mb-4">
                <h4 class="text-lg font-semibold">Field Mapping</h4>
                <button id="addFieldRowBtn" class="theme-btn px-3 py-1.5 text-sm flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Add Field
                </button>
            </div>
            
            <div class="border border-black/10 rounded p-2 bg-black/5">
                <div id="mappingList" class="space-y-2 min-h-[100px]">
                    <!-- Rendered by JS -->
                    <div id="noMappedFieldsMsg" class="text-center py-8 text-sm theme-text-muted">
                        Click "+ Add Field" to start mapping.
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Footer: Schedule Settings -->
    <div class="p-4 border-t border-black/10 flex items-center justify-between bg-black/5 flex-wrap gap-4">
        <div class="flex items-center gap-3">
            <label class="text-sm font-medium">Run Every (Seconds):</label>
            <input type="number" id="scheduleInterval" class="theme-input w-24 p-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="60">
        </div>
        <div class="flex items-center gap-3">
            <label class="text-sm font-medium">Timeout (Secs):</label>
            <input type="number" id="clientTimeout" class="theme-input w-20 p-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="30">
        </div>
        <div class="flex items-center gap-3">
            <label class="text-sm font-medium">Max Retries:</label>
            <input type="number" id="clientRetries" class="theme-input w-20 p-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="3">
        </div>
    </div>

    <!-- Value Mapping Modal -->
    <div id="valueMappingModal" class="fixed inset-0 [background:var(--overlay-bg)] [backdrop-filter:var(--backdrop)] z-[60] flex items-center justify-center p-4" style="display: none;">
        <div class="theme-panel rounded-xl shadow-xl max-w-xl w-full p-6 flex flex-col relative">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">Value Mapping for <span id="valueMappingFieldName" class="text-indigo-500">Field</span></h3>
                <button id="closeValueMappingBtn" class="theme-text-muted hover:opacity-75 text-2xl">&times;</button>
            </div>
            
            <div class="flex-1 overflow-y-auto space-y-3 mb-4 max-h-[60vh]">
                <div class="grid grid-cols-12 gap-2 text-xs font-medium theme-text-muted px-1">
                    <div class="col-span-3">Source Value</div>
                    <div class="col-span-2">Source Type</div>
                    <div class="col-span-1"></div>
                    <div class="col-span-3">Target Value</div>
                    <div class="col-span-2">Target Type</div>
                    <div class="col-span-1"></div>
                </div>
                
                <div id="valueMappingRowsContainer">
                    <!-- Value Mapping rows injected via JS -->
                </div>
                
                <button id="addValueMappingRowBtn" class="theme-btn px-3 py-2 text-sm w-full mt-2 border-dashed bg-transparent hover:bg-black/5">+ Add Value Mapping</button>
            </div>
            
            <div class="flex justify-end">
                <button id="doneValueMappingBtn" class="theme-btn px-6 py-2 rounded">Done</button>
            </div>
        </div>
    </div>
</div>
