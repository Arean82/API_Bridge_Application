<div id="email-templates-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4" style="background: var(--overlay-bg);">
    <div class="theme-panel w-full max-w-5xl h-[80vh] flex flex-col shadow-2xl rounded-lg overflow-hidden relative">
        
        <!-- Header -->
        <div class="px-6 py-4 border-b border-black/10 flex justify-between items-center" style="background: rgba(0,0,0,0.03);">
            <div>
                <h3 class="text-xl font-bold">Manage Email Templates</h3>
                <p class="text-sm theme-text-muted">Select an HTML template to edit its structure and styling.</p>
            </div>
            <button type="button" onclick="document.getElementById('email-templates-modal').remove()" class="text-gray-500 hover:text-red-500 transition">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Body (Sidebar + Editor) -->
        <div class="flex-1 flex overflow-hidden">
            
            <!-- Sidebar: File List -->
            <div class="w-1/4 border-r border-black/10 flex flex-col overflow-y-auto" style="background: rgba(0,0,0,0.02);">
                <div class="p-3 font-semibold text-sm border-b border-black/10">Available Templates</div>
                <ul class="flex-1">
                    {% for file in template_files %}
                    <li>
                        <button type="button" 
                            hx-get="/htmx/email_templates/{{ file }}" 
                            hx-target="#template-editor-content"
                            class="w-full text-left px-4 py-3 text-sm hover:bg-black/5 transition border-b border-black/5 flex items-center focus:bg-black/10">
                            <svg class="h-4 w-4 mr-2 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                            </svg>
                            {{ file }}
                        </button>
                    </li>
                    {% else %}
                    <li class="p-4 text-sm theme-text-muted text-center italic">No templates found.</li>
                    {% endfor %}
                </ul>
            </div>

            <!-- Main Editor Area -->
            <div class="w-3/4 flex flex-col relative" id="template-editor-content">
                <div class="flex-1 flex items-center justify-center theme-text-muted">
                    <p>Select a template from the left to edit.</p>
                </div>
            </div>

        </div>
    </div>
</div>
