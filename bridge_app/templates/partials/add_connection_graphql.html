<div id="graphqlConnBlock" style="display: none;">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- Left Column -->
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-medium mb-1">Connection Name</label>
                <input type="text" id="graphqlConnName" class="theme-input w-full p-2 text-sm" placeholder="e.g. My GraphQL API">
            </div>

            <div class="space-y-4">
                <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded border border-gray-200 dark:border-gray-700">
                    <label class="block text-xs font-medium mb-1">GraphQL API Base URL <span class="text-red-500">*</span></label>
                    <input type="text" id="graphqlConnUrl" class="theme-input w-full p-1.5 text-xs" placeholder="https://api.example.com/graphql">
                </div>

                <div id="graphqlConnSourceSection">
                    <label class="block text-sm font-medium mb-1">Schema Source</label>
                    <select id="graphqlConnSchemaSource" class="theme-input w-full p-2 text-sm">
                        <option value="introspection">Automatic Introspection</option>
                        <option value="file">Upload Schema File (.graphql, .json)</option>
                        <option value="sdl">Paste Schema SDL</option>
                    </select>
                </div>

                <!-- GraphQL Schema SDL Paste Section -->
                <div id="graphqlConnSdlSection" style="display: none;">
                    <label class="block text-sm font-medium mb-1">GraphQL Schema SDL</label>
                    <textarea id="graphqlConnSdlText" class="theme-input w-full p-2 text-xs font-mono" rows="8" placeholder="type Query {&#10;  users: [User!]!&#10;}"></textarea>
                    <p id="graphqlConnSdlError" class="text-xs text-red-500 mt-1 hidden">Invalid GraphQL Schema syntax.</p>
                </div>

                <!-- GraphQL Schema File Section -->
                <div id="graphqlConnFileSection" style="display: none;">
                    <label class="block text-sm font-medium mb-1">Upload Schema File</label>
                    <input type="file" id="graphqlConnFileInput" accept=".graphql,.gql,.json" class="theme-input w-full p-1.5 text-sm">
                    <p id="graphqlConnFileStatus" class="text-xs theme-text-muted mt-1 break-all"></p>
                </div>

                <!-- Validation Result Block -->
                <div id="graphqlConnValidationResult" style="display: none;" class="p-3 rounded-md text-sm border">
                    <!-- Injected via JS -->
                </div>
            </div>
        </div>
        
        <!-- Right Column -->
        <div>
            <h4 class="text-base font-semibold mb-4 border-b border-gray-200 dark:border-gray-700 pb-1">Advanced Settings (Optional)</h4>
            
            <div class="space-y-5">
                <!-- Authentication Section -->
                <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded border border-gray-200 dark:border-gray-700 space-y-3">
                    <div class="flex items-center justify-between border-b border-gray-200 dark:border-gray-700 pb-2 mb-2">
                        <label class="text-sm font-semibold">Upstream API Authentication</label>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Authentication Type</label>
                        <select id="graphqlConnAuthType" class="theme-input w-full p-2 text-sm">
                            <option value="none">None</option>
                            <option value="bearer">Bearer Token</option>
                            <option value="api_key">API Key</option>
                            <option value="basic">Basic Authentication</option>
                        </select>
                    </div>
                    
                    <div id="graphqlAuthBearerSection" style="display: none;">
                        <label class="block text-xs font-medium mb-1">Bearer Token</label>
                        <input type="password" id="graphqlConnAuthBearerToken" class="theme-input w-full p-1.5 text-xs" placeholder="eyJhbGciOiJIUzI1...">
                    </div>
                    
                    <div id="graphqlAuthApiKeySection" style="display: none;" class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-medium mb-1">Header Name</label>
                            <input type="text" id="graphqlConnAuthApiKeyName" class="theme-input w-full p-1.5 text-xs" placeholder="X-API-Key">
                        </div>
                        <div>
                            <label class="block text-xs font-medium mb-1">API Key</label>
                            <input type="password" id="graphqlConnAuthApiKeyValue" class="theme-input w-full p-1.5 text-xs" placeholder="your-api-key">
                        </div>
                    </div>
                    
                    <div id="graphqlAuthBasicSection" style="display: none;" class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-medium mb-1">Username</label>
                            <input type="text" id="graphqlConnAuthBasicUsername" class="theme-input w-full p-1.5 text-xs" placeholder="admin">
                        </div>
                        <div>
                            <label class="block text-xs font-medium mb-1">Password</label>
                            <input type="password" id="graphqlConnAuthBasicPassword" class="theme-input w-full p-1.5 text-xs" placeholder="••••••••">
                        </div>
                    </div>
                </div>
                
                <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded border border-gray-200 dark:border-gray-700">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium">Custom Headers</label>
                        <button type="button" id="graphqlConnAddHeaderBtn" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium">+ Add Header</button>
                    </div>
                    <div id="graphqlConnCustomHeadersContainer" class="space-y-2 max-h-32 overflow-y-auto">
                        <!-- Header rows go here -->
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Auto-Sync Schedule</label>
                    <select id="graphqlConnSyncSchedule" class="theme-input w-full p-2 text-sm">
                        <option value="">None (Manual Refresh Only)</option>
                        <option value="hourly">Every Hour</option>
                        <option value="daily">Every Day</option>
                        <option value="weekly">Every Week</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
</div>
