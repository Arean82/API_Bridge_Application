<!-- REST API Connections -->
<div id="pane-rest" class="conn-pane space-y-4">
    {% set rest_conns = [] %}
    {% for conn in connections %}
        {% if conn.connection_type == 'rest' or not conn.connection_type %}
            {% set _ = rest_conns.append(conn) %}
            {{ render_connection(conn) }}
        {% endif %}
    {% endfor %}
    {% if not rest_conns %}
        <p class="text-sm theme-text-muted italic">No REST API connections found.</p>
    {% endif %}
</div>
